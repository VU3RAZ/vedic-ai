<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vedic AI — Jyotish Analysis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1f35;
      --card-bg:   #252b45;
      --accent:    #f59e0b;
      --accent-dim:#b45309;
      --accent2:   #7c5cbf;
      --accent2-dim:#5b3f9a;
      --text:      #e8eaf0;
      --muted:     #8892a4;
      --border:    #313859;
      --error:     #f87171;
      --success:   #34d399;
      --info:      #60a5fa;
      --radius:    10px;
      --transition: 0.2s ease;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-size: 1.5rem; }
    header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
    header p  { font-size: 0.8rem; color: var(--muted); margin-top: 1px; }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      height: calc(100vh - 60px);
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 0.82rem; color: var(--muted); font-weight: 600; }
    .field input, .field select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 8px 10px;
      width: 100%;
      transition: border-color var(--transition);
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .field input[type="number"] { -moz-appearance: textfield; }
    .field input[type="number"]::-webkit-outer-spin-button,
    .field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .toggle-row input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
    }

    .btn-group { display: flex; gap: 10px; }
    .btn {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary   { background: var(--accent); color: #0f1220; }
    .btn-raman     { background: var(--accent2); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-primary:hover:not(:disabled)   { background: #fbbf24; }
    .btn-secondary:hover:not(:disabled) { background: #3d4668; }

    .quick-fill { display: flex; flex-direction: column; gap: 8px; }
    .quick-fill-btns { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: 0.78rem;
      padding: 4px 12px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }
    .chip:hover { background: var(--border); color: var(--text); border-color: var(--accent); }

    hr.divider { border: none; border-top: 1px solid var(--border); }

    /* ── RIGHT PANEL ── */
    .panel-right {
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
      color: var(--muted);
      text-align: center;
    }
    .placeholder .big-icon { font-size: 3.5rem; opacity: 0.35; }
    .placeholder p { max-width: 300px; font-size: 0.9rem; }

    /* Spinner */
    .spinner-wrap {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 30px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .spinner-wrap.active { display: flex; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error banner */
    .error-banner {
      display: none;
      background: rgba(248,113,113,0.12);
      border: 1px solid var(--error);
      border-radius: var(--radius);
      color: var(--error);
      font-size: 0.85rem;
      padding: 12px 16px;
    }
    .error-banner.active { display: block; }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: -1px;
      padding: 8px 14px;
      text-transform: uppercase;
      transition: color var(--transition), border-color var(--transition);
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { border-bottom-color: var(--accent); color: var(--accent); }
    .tab-panel { display: none; flex-direction: column; gap: 16px; }
    .tab-panel.active { display: flex; }

    /* Chart table */
    .result-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .result-card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.87rem;
    }
    th {
      background: rgba(245,158,11,0.08);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 14px;
      text-align: left;
    }
    td { padding: 9px 14px; border-top: 1px solid var(--border); }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .retro { color: var(--error); font-size: 0.8rem; }
    .planet-sym { font-size: 1.1rem; margin-right: 4px; }

    /* Aspect / drishti badges */
    .badge {
      display: inline-block;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 1px 6px;
      margin: 1px 2px;
    }
    .badge-graha  { background: rgba(245,158,11,0.18); color: var(--accent); }
    .badge-rashi  { background: rgba(96,165,250,0.18); color: var(--info); }
    .badge-double { background: rgba(52,211,153,0.18); color: var(--success); }
    .badge-occ    { background: rgba(248,113,113,0.18); color: var(--error); }

    /* Sandhi / dignity badges */
    .dg-exalted   { color: var(--success); font-size: 0.75rem; }
    .dg-own       { color: var(--accent);  font-size: 0.75rem; }
    .dg-debi      { color: var(--error);   font-size: 0.75rem; }
    .dg-mula      { color: var(--info);    font-size: 0.75rem; }
    .sandhi-label { font-size: 0.72rem; color: var(--muted); font-style: italic; }
    .sandhi-warn  { font-size: 0.72rem; color: var(--error); font-style: italic; }
    .madhya-ok    { font-size: 0.72rem; color: var(--success); font-style: italic; }

    /* Varga cards */
    .varga-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }
    .varga-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .varga-card-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .varga-badge {
      background: rgba(245,158,11,0.15);
      border-radius: 4px;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 2px 8px;
    }
    .varga-title { font-weight: 700; font-size: 0.92rem; }
    .varga-domain { font-size: 0.75rem; color: var(--muted); }
    .varga-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; font-size: 0.84rem; }
    .varga-row { display: flex; justify-content: space-between; align-items: center; }
    .varga-row .label { color: var(--muted); font-size: 0.8rem; }
    .varga-yogas { display: flex; flex-direction: column; gap: 4px; padding-top: 4px; border-top: 1px solid var(--border); margin-top: 4px; }
    .yoga-item {
      font-size: 0.78rem;
      color: var(--muted);
      padding-left: 10px;
      position: relative;
    }
    .yoga-item::before { content: "›"; position: absolute; left: 0; color: var(--accent); }
    .stats-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-chip {
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 7px;
    }
    .stat-exalted  { background: rgba(52,211,153,0.15); color: var(--success); }
    .stat-own      { background: rgba(245,158,11,0.15); color: var(--accent); }
    .stat-debi     { background: rgba(248,113,113,0.15); color: var(--error); }
    .stat-score    { background: rgba(96,165,250,0.15); color: var(--info); }

    /* Prediction cards */
    .pred-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .pred-card-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .pred-icon { font-size: 1.4rem; }
    .pred-title { font-weight: 700; font-size: 1rem; color: var(--accent); }
    .pred-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
    .pred-summary { font-size: 0.9rem; line-height: 1.7; color: var(--text); }
    .pred-details { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .pred-details li {
      font-size: 0.84rem;
      color: var(--muted);
      padding-left: 14px;
      position: relative;
    }
    .pred-details li::before {
      content: "›";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }

    /* Evidence accordion */
    .evidence-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      padding: 6px 12px;
      width: fit-content;
      transition: border-color var(--transition), color var(--transition);
    }
    .evidence-toggle:hover { border-color: var(--accent); color: var(--text); }
    .evidence-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .evidence-panel.open { display: flex; }
    .evidence-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.82rem;
      padding: 10px 14px;
    }
    .evidence-item .ev-source {
      color: var(--accent-dim);
      font-size: 0.75rem;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .evidence-item .ev-text { color: var(--muted); line-height: 1.5; }

    /* Yogas */
    .yoga-cards { display: flex; flex-direction: column; gap: 10px; }
    .yoga-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
    }
    .yoga-card-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .yoga-card-detail { font-size: 0.83rem; color: var(--muted); }
    .yoga-none { font-size: 0.83rem; color: var(--muted); font-style: italic; padding: 6px 0; }
    .yoga-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 14px 0 6px;
    }
    .yoga-flag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 6px;
      font-size: 0.84rem;
      font-weight: 700;
      padding: 6px 14px;
    }
    .yoga-flag-yes   { background: rgba(52,211,153,0.12); color: var(--success); border: 1px solid rgba(52,211,153,0.3); }
    .yoga-flag-no    { background: rgba(248,113,113,0.12); color: var(--error);   border: 1px solid rgba(248,113,113,0.3); }
    .yoga-flag-neutral { background: rgba(96,165,250,0.12); color: var(--info);   border: 1px solid rgba(96,165,250,0.3); }

    /* Varga planet mini-table */
    .varga-planets { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
    .varga-planets summary {
      cursor: pointer;
      font-size: 0.76rem;
      color: var(--muted);
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .varga-planets summary::-webkit-details-marker { display: none; }
    .varga-planets[open] summary .tog-arrow { transform: rotate(90deg); }
    .tog-arrow { display: inline-block; transition: transform 0.15s; font-size: 0.7rem; }
    .varga-planets table { margin-top: 6px; width: 100%; font-size: 0.77rem; }
    .varga-planets th { font-size: 0.69rem; padding: 5px 8px; }
    .varga-planets td { padding: 5px 8px; }

    /* Responsive */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">&#9654;</span>
  <div>
    <h1>Vedic AI — Jyotish Analysis</h1>
    <p>Local-first Vedic astrology prediction engine</p>
  </div>
</header>

<div class="layout">

  <!-- LEFT: Form -->
  <aside class="panel-left">

    <div>
      <div class="section-title">Birth Data</div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="field">
          <label for="name">Name (optional)</label>
          <input type="text" id="name" placeholder="Native's name" />
        </div>
        <div class="field">
          <label for="bdt">Birth Date &amp; Time</label>
          <input type="datetime-local" id="bdt" />
        </div>
        <div class="field">
          <label for="tz">Timezone Offset</label>
          <select id="tz">
            <option value="+05:30" selected>IST +05:30 (India)</option>
            <option value="+05:45">NPT +05:45 (Nepal)</option>
            <option value="+06:00">BST +06:00 (Bangladesh)</option>
            <option value="+05:00">PKT +05:00 (Pakistan)</option>
            <option value="+07:00">ICT +07:00 (Thailand/Vietnam)</option>
            <option value="+08:00">CST +08:00 (China/Singapore)</option>
            <option value="+09:00">JST +09:00 (Japan)</option>
            <option value="+03:00">MSK +03:00 (Moscow)</option>
            <option value="+01:00">CET +01:00 (Central Europe)</option>
            <option value="+00:00">UTC +00:00</option>
            <option value="-05:00">EST -05:00 (New York)</option>
            <option value="-06:00">CST -06:00 (Chicago)</option>
            <option value="-07:00">MST -07:00 (Denver)</option>
            <option value="-08:00">PST -08:00 (Los Angeles)</option>
          </select>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="lat">Latitude</label>
            <input type="number" id="lat" step="0.0001" placeholder="21.1458" />
          </div>
          <div class="field">
            <label for="lon">Longitude</label>
            <input type="number" id="lon" step="0.0001" placeholder="79.0882" />
          </div>
        </div>
        <div class="field">
          <label for="scope">Scope</label>
          <select id="scope">
            <option value="all" selected>All Scopes</option>
            <option value="personality">Personality</option>
            <option value="career">Career</option>
            <option value="relationships">Relationships</option>
            <option value="health">Health</option>
          </select>
        </div>
        <div class="toggle-row">
          <input type="checkbox" id="dryrun" />
          <label for="dryrun">Dry Run — skip LLM, show evidence only</label>
        </div>
      </div>
    </div>

    <hr class="divider" />

    <div>
      <div class="section-title">LLM Backend</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="field">
          <label for="llm-backend">Backend</label>
          <select id="llm-backend" onchange="onBackendChange()">
            <option value="ollama">Ollama</option>
            <option value="lmstudio">LM Studio</option>
            <option value="llamacpp">llama.cpp</option>
          </select>
        </div>
        <div class="field">
          <label for="llm-url">Base URL</label>
          <input type="text" id="llm-url" placeholder="http://localhost:11434" />
        </div>
        <div class="field">
          <label for="llm-model">Model</label>
          <input type="text" id="llm-model" placeholder="qwen2.5:14b" />
        </div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" onclick="computeChart()">Compute Chart</button>
    </div>
    <div class="btn-group" style="margin-top:8px;">
      <button class="btn btn-primary"   onclick="runPrediction(false)">&#9788; Standard</button>
      <button class="btn btn-raman"     onclick="runPrediction(true)">&#9775; Raman</button>
    </div>

    <hr class="divider" />

    <div class="quick-fill">
      <div class="section-title">Quick Fill — Example Births</div>
      <div class="quick-fill-btns">
        <button class="chip" onclick="fillExample('nagpur1972')">Nagpur 1972-08-27</button>
        <button class="chip" onclick="fillExample('delhi1985')">Delhi 1985-03-15</button>
        <button class="chip" onclick="fillExample('mumbai2000')">Mumbai 2000-01-01</button>
      </div>
    </div>

  </aside>

  <!-- RIGHT: Results -->
  <main class="panel-right" id="results-panel">

    <div class="placeholder" id="placeholder">
      <span class="big-icon">&#9775;</span>
      <p>Enter birth data on the left, then click <strong>Compute Chart</strong> or <strong>Generate Prediction</strong>.</p>
    </div>

    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
      <span id="spinner-label">Working…</span>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <div id="chart-section"></div>
    <div id="prediction-section"></div>

  </main>
</div>

<script>
  // ── LLM backend defaults ───────────────────────────────────────────────────
  const BACKEND_DEFAULTS = {
    ollama:   { url: 'http://localhost:11434', model: 'qwen2.5:14b' },
    lmstudio: { url: 'http://localhost:1234',  model: 'local-model' },
    llamacpp: { url: 'http://localhost:8080',  model: 'default' },
  };

  function onBackendChange() {
    const backend = document.getElementById('llm-backend').value;
    const def = BACKEND_DEFAULTS[backend] || {};
    document.getElementById('llm-url').value   = def.url   || '';
    document.getElementById('llm-model').value = def.model || '';
  }

  async function initBackendSelector() {
    try {
      const resp = await fetch('/predictions/backends');
      if (!resp.ok) return;
      const data = await resp.json();
      // Set active backend in selector
      const sel = document.getElementById('llm-backend');
      if (data.active && sel) {
        sel.value = data.active;
      }
      // Merge server-side defaults (model names from models.yaml)
      if (data.backends) {
        for (const [key, cfg] of Object.entries(data.backends)) {
          if (BACKEND_DEFAULTS[key]) {
            if (cfg.base_url) BACKEND_DEFAULTS[key].url   = cfg.base_url;
            if (cfg.model)    BACKEND_DEFAULTS[key].model = cfg.model;
          }
        }
      }
      onBackendChange();
    } catch (_) {
      onBackendChange();
    }
  }

  // ── Planet symbols ──────────────────────────────────────────────────────────
  const PLANET_SYMS = {
    Sun:     '&#9737;',
    Moon:    '&#9789;',
    Mars:    '&#9794;',
    Mercury: '&#9791;',
    Jupiter: '&#9795;',
    Venus:   '&#9792;',
    Saturn:  '&#9796;',
    Rahu:    '&#9738;',
    Ketu:    '&#9739;',
  };

  const SCOPE_ICONS = {
    personality:   '&#9789;',
    career:        '&#9795;',
    relationships: '&#9792;',
    health:        '&#10052;',
  };

  // ── Quick-fill data ─────────────────────────────────────────────────────────
  const EXAMPLES = {
    nagpur1972: { name: 'Nagpur Native', dt: '1972-08-27T19:45', tz: '+05:30', lat: 21.1458, lon: 79.0882 },
    delhi1985:  { name: 'Delhi Native',  dt: '1985-03-15T08:30', tz: '+05:30', lat: 28.6139, lon: 77.2090 },
    mumbai2000: { name: 'Mumbai Native', dt: '2000-01-01T06:00', tz: '+05:30', lat: 19.0760, lon: 72.8777 },
  };

  function fillExample(key) {
    const e = EXAMPLES[key];
    document.getElementById('name').value = e.name;
    document.getElementById('bdt').value  = e.dt;
    document.getElementById('tz').value   = e.tz;
    document.getElementById('lat').value  = e.lat;
    document.getElementById('lon').value  = e.lon;
  }

  // ── UI helpers ──────────────────────────────────────────────────────────────
  function showSpinner(label) {
    document.getElementById('placeholder').style.display   = 'none';
    document.getElementById('spinner-label').textContent   = label;
    document.getElementById('spinner').classList.add('active');
    document.getElementById('error-banner').classList.remove('active');
  }
  function hideSpinner() {
    document.getElementById('spinner').classList.remove('active');
  }
  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg;
    el.classList.add('active');
    hideSpinner();
  }

  // ── Build ISO-8601 datetime string ──────────────────────────────────────────
  function buildISODatetime() {
    const dt = document.getElementById('bdt').value;
    const tz = document.getElementById('tz').value;
    if (!dt) return null;
    return dt + ':00' + tz;
  }

  // ── Collect form values ─────────────────────────────────────────────────────
  function collectForm() {
    const iso = buildISODatetime();
    if (!iso) { showError('Please enter a birth date and time.'); return null; }
    const lat = parseFloat(document.getElementById('lat').value);
    const lon = parseFloat(document.getElementById('lon').value);
    if (isNaN(lat) || isNaN(lon)) { showError('Please enter valid latitude and longitude.'); return null; }
    const llmBackend = document.getElementById('llm-backend').value;
    const llmUrl     = document.getElementById('llm-url').value.trim();
    const llmModel   = document.getElementById('llm-model').value.trim();
    return {
      birth_datetime: iso,
      latitude:  lat,
      longitude: lon,
      name:      document.getElementById('name').value.trim() || null,
      scope:       document.getElementById('scope').value,
      dry_run:     document.getElementById('dryrun').checked,
      llm_backend: llmBackend || null,
      llm_base_url: llmUrl    || null,
      llm_model:    llmModel  || null,
    };
  }

  // ── Tab switching ───────────────────────────────────────────────────────────
  function switchTab(barId, panelClass, activeId) {
    document.querySelectorAll('#' + barId + ' .tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.' + panelClass).forEach(p => p.classList.remove('active'));
    document.getElementById(activeId + '-btn').classList.add('active');
    document.getElementById(activeId + '-panel').classList.add('active');
  }

  // ── Dignity display helpers ─────────────────────────────────────────────────
  function dignityHTML(d) {
    if (!d) return '';
    const cls = d === 'exalted' ? 'dg-exalted' : d === 'debilitated' ? 'dg-debi' : d === 'moolatrikona' ? 'dg-mula' : (d === 'own' ? 'dg-own' : '');
    return cls ? ` <span class="${cls}">${escapeHTML(d)}</span>` : ` <span style="color:var(--muted);font-size:0.75rem">${escapeHTML(d)}</span>`;
  }

  function sandhiHTML(p) {
    if (!p) return '';
    if (p.is_sandhi) return `<br><span class="sandhi-warn">⚠ ${escapeHTML(p.sandhi_label || 'Sandhi')}</span>`;
    if (p.is_bhava_madhya) return `<br><span class="madhya-ok">✓ Bhava Madhya</span>`;
    return '';
  }

  // ── Compute Chart ───────────────────────────────────────────────────────────
  async function computeChart() {
    const form = collectForm();
    if (!form) return;

    showSpinner('Computing chart…');
    document.getElementById('chart-section').innerHTML = '';

    try {
      const resp = await fetch('/charts/compute', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          birth_datetime: form.birth_datetime,
          latitude:  form.latitude,
          longitude: form.longitude,
          name:      form.name,
        }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }
      const data = await resp.json();
      hideSpinner();
      renderChart(data);
    } catch (err) {
      showError('Chart error: ' + err.message);
    }
  }

  function renderChart(data) {
    const d1         = data.d1 || {};
    const planetsMap = d1.planets || {};
    const houses     = d1.houses  || {};
    const dashas     = data.dashas || [];
    const features   = data.derived_features || {};
    const drishti    = features.drishti || {};
    const vargas     = features.varga_analysis || {};
    const sandhi     = features.sandhi || {};

    // Lagna sign from house 1
    const lagna = (houses['1'] || houses[1] || {}).rasi || '—';

    // ── Planet rows ─────────────────────────────────────────────────────────
    const ORDER = ['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu'];
    let tbody = '';
    ORDER.forEach(name => {
      const p  = planetsMap[name];
      if (!p) return;
      const fp = (features.planets || {})[name] || {};
      const sh = sandhi[name] || {};
      const sym    = PLANET_SYMS[name] || '';
      const sign   = (p.rasi || {}).rasi || '—';
      const deg    = (p.rasi || {}).degree_in_rasi;
      const degStr = deg != null ? deg.toFixed(2) + '°' : '—';
      const retro  = p.is_retrograde ? '<span class="retro" title="Retrograde">℞</span>' : '—';
      const vargo  = fp.is_vargottama  ? ' <span style="color:var(--info);font-size:0.72rem" title="Vargottama">V</span>' : '';
      const ykBadge = fp.is_yogakaraka ? ' <span style="color:var(--success);font-size:0.70rem;font-weight:700" title="Yogakaraka — owns kendra+trikona">YK</span>' : '';
      const mkBadge = fp.is_maraka     ? ' <span style="color:var(--error);font-size:0.70rem" title="Maraka — lord of H2 or H7">MK</span>'  : '';
      const cBadge  = fp.is_combust && !fp.combust_exempt ? ' <span style="color:var(--warning,#f59e0b);font-size:0.70rem" title="Combust — burnt by Sun">☀</span>' : '';
      const fnRole  = fp.functional_role || '';
      const fnColor = fnRole === 'yogakaraka' ? 'var(--success)' : fnRole === 'benefic' ? 'var(--info)' : fnRole === 'malefic' ? 'var(--error)' : 'var(--muted)';
      tbody += `<tr>
        <td><span class="planet-sym">${sym}</span>${escapeHTML(name)}${vargo}${ykBadge}${mkBadge}${cBadge}</td>
        <td>${escapeHTML(sign)}${dignityHTML(p.dignity)}${sandhiHTML(sh)}</td>
        <td style="text-align:center">${p.house ?? '—'}</td>
        <td style="text-align:center">${degStr}</td>
        <td style="text-align:center">${retro}</td>
        <td style="text-align:center;color:${fnColor};font-size:0.76rem">${fnRole || '—'}</td>
      </tr>`;
    });

    // ── House rows ──────────────────────────────────────────────────────────
    let houseTbody = '';
    for (let i = 1; i <= 12; i++) {
      const h   = houses[String(i)] || houses[i] || {};
      const occ = (h.occupants || []).join(', ') || '—';
      houseTbody += `<tr>
        <td style="text-align:center;color:var(--accent)">${i}</td>
        <td>${escapeHTML(h.rasi || '—')}</td>
        <td style="color:var(--muted);font-size:0.82rem">${escapeHTML(h.lord || '—')}</td>
        <td style="color:var(--muted);font-size:0.82rem">${escapeHTML(occ)}</td>
      </tr>`;
    }

    // ── Dasha rows ──────────────────────────────────────────────────────────
    let dashaRows = '';
    dashas.filter(d => d.level === 1).slice(0, 9).forEach(d => {
      const sym = PLANET_SYMS[d.graha] || '';
      dashaRows += `<tr>
        <td><span class="planet-sym">${sym}</span>${escapeHTML(d.graha)}</td>
        <td style="color:var(--muted);font-size:0.82rem">${d.start_date}</td>
        <td style="color:var(--muted);font-size:0.82rem">${d.end_date}</td>
      </tr>`;
    });

    // ── Drishti matrix tab ──────────────────────────────────────────────────
    const matrix = (drishti.matrix || []);
    let drishtiRows = '';
    matrix.forEach(row => {
      const occ = (row.occupants || []).map(g =>
        `<span class="badge badge-occ">${escapeHTML(g)}</span>`).join('');
      const gd  = (row.graha_drishti || []).map(g =>
        (row.double_aspect || []).includes(g)
          ? `<span class="badge badge-double" title="Graha + Rashi drishti">${escapeHTML(g)}</span>`
          : `<span class="badge badge-graha">${escapeHTML(g)}</span>`).join('');
      const rd  = (row.rashi_drishti || []).filter(g => !(row.graha_drishti||[]).includes(g))
        .map(g => `<span class="badge badge-rashi">${escapeHTML(g)}</span>`).join('');
      drishtiRows += `<tr>
        <td style="text-align:center;color:var(--accent);font-weight:700">${row.house}</td>
        <td>${escapeHTML(row.rasi || '—')}</td>
        <td>${occ || '<span style="color:var(--muted)">—</span>'}</td>
        <td>${(gd + rd) || '<span style="color:var(--muted)">—</span>'}</td>
        <td style="text-align:center;color:var(--muted);font-size:0.82rem">${row.graha_strength ?? '—'}</td>
      </tr>`;
    });

    // ── Varga cards tab ─────────────────────────────────────────────────────
    const VARGA_ORDER = ['D9','D10','D6','D3','D7','D12','D2','D4','D8','D16','D20','D24','D27','D30','D60'];
    const PLANET_ORDER = ['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu'];
    let vargaCards = '<div class="varga-grid">';
    VARGA_ORDER.forEach(div => {
      const v = vargas[div];
      if (!v) return;
      const stats = v.dignity_stats || {};
      const yogas = (v.yogas || []).slice(0, 5);
      const karakas = (v.karaka_analysis || []);
      const karakaSet = new Set(karakas.map(k => k.graha));

      const yogaHTML = yogas.length ? `
        <div class="varga-yogas">
          ${yogas.map(y => `<div class="yoga-item">${escapeHTML(formatYoga(y))}</div>`).join('')}
        </div>` : '';

      const karakaHTML = karakas.length ? `
        <div style="font-size:0.78rem;color:var(--muted);margin-top:4px">
          ${karakas.map(k => `<span><strong style="color:var(--text)">${escapeHTML(k.graha)}</strong>: ${escapeHTML(k.rasi)} H${k.house}${k.dignity ? dignityHTML(k.dignity) : ''}</span>`).join(' &nbsp;·&nbsp; ')}
        </div>` : '';

      // Planet mini-table
      const planetRows = (v.planets || [])
        .sort((a, b) => PLANET_ORDER.indexOf(a.graha) - PLANET_ORDER.indexOf(b.graha))
        .map(p => {
          const sym = PLANET_SYMS[p.graha] || '';
          const isKaraka = karakaSet.has(p.graha);
          const retro = p.is_retrograde ? '<span class="retro" style="font-size:0.7rem">℞</span>' : '';
          const nameStyle = isKaraka ? 'color:var(--accent);font-weight:700' : '';
          return `<tr>
            <td style="${nameStyle}"><span class="planet-sym" style="font-size:0.9rem">${sym}</span>${escapeHTML(p.graha)}${retro}</td>
            <td>${escapeHTML(p.rasi)}</td>
            <td style="text-align:center">${p.house}</td>
            <td>${dignityHTML(p.dignity)}</td>
          </tr>`;
        }).join('');

      const planetTableHTML = `
        <details class="varga-planets">
          <summary><span class="tog-arrow">▶</span> Planets in ${escapeHTML(div)}</summary>
          <table>
            <thead><tr><th>Planet</th><th>Sign</th><th style="text-align:center">H</th><th>Dignity</th></tr></thead>
            <tbody>${planetRows}</tbody>
          </table>
        </details>`;

      vargaCards += `
        <div class="varga-card">
          <div class="varga-card-header">
            <span class="varga-badge">${escapeHTML(div)}</span>
            <div>
              <div class="varga-title">${escapeHTML(v.name)}</div>
              <div class="varga-domain">${escapeHTML(v.domain)}</div>
            </div>
          </div>
          <div class="varga-body">
            <div class="varga-row">
              <span class="label">Lagna</span>
              <span>${escapeHTML(v.lagna || '—')} · lord <strong>${escapeHTML(v.lagna_lord||'')}</strong> H${v.lagna_lord_house ?? '?'}${dignityHTML(v.lagna_lord_dignity)}</span>
            </div>
            <div class="stats-row">
              ${stats.exalted  ? `<span class="stat-chip stat-exalted">&#9650; ${stats.exalted} exalted</span>` : ''}
              ${stats.own_sign ? `<span class="stat-chip stat-own">&#9679; ${stats.own_sign} own</span>` : ''}
              ${stats.debilitated ? `<span class="stat-chip stat-debi">&#9660; ${stats.debilitated} debilitated</span>` : ''}
              <span class="stat-chip stat-score">score ${stats.strength_score >= 0 ? '+' : ''}${stats.strength_score}</span>
            </div>
            ${karakaHTML}
            ${yogaHTML}
            ${planetTableHTML}
          </div>
        </div>`;
    });
    vargaCards += '</div>';

    // ── Yogas tab ────────────────────────────────────────────────────────────
    const yogas = features.yogas || {};

    function yogaFlagHTML(label, isTrue, trueMsg, falseMsg) {
      const cls = isTrue ? 'yoga-flag-yes' : 'yoga-flag-no';
      return `<span class="yoga-flag ${cls}">${isTrue ? '✓' : '✗'} ${escapeHTML(label)}: ${isTrue ? trueMsg : falseMsg}</span>`;
    }

    const gajakesariFlag = yogaFlagHTML('Gajakesari', !!yogas.gajakesari, 'present', 'absent');
    const kemadrumaFlag  = yogaFlagHTML('Kemadruma',  !!yogas.kemadruma,  'present (affliction)', 'absent');

    const rajaCards = (yogas.raja_yogas || []).length
      ? (yogas.raja_yogas).map(y => `<div class="yoga-card">
          <div class="yoga-card-name">Raja Yoga — ${escapeHTML(y.trikona_lord)} + ${escapeHTML(y.kendra_lord)}</div>
          <div class="yoga-card-detail">${escapeHTML(y.trikona_lord)} (H${y.house_t}, trikona lord) &amp; ${escapeHTML(y.kendra_lord)} (H${y.house_k}, kendra lord) — ${escapeHTML(y.association)}</div>
        </div>`).join('')
      : '<div class="yoga-none">None detected.</div>';

    const dhanaCards = (yogas.dhana_yogas || []).length
      ? (yogas.dhana_yogas).map(y => `<div class="yoga-card">
          <div class="yoga-card-name">Dhana Yoga — ${escapeHTML(y.wealth_lord)} + ${escapeHTML(y.prosperity_lord)}</div>
          <div class="yoga-card-detail">${escapeHTML(y.wealth_lord)} (H${y.house_w}, 2nd/11th lord) &amp; ${escapeHTML(y.prosperity_lord)} (H${y.house_p}, 1st/9th lord) — ${escapeHTML(y.association)}</div>
        </div>`).join('')
      : '<div class="yoga-none">None detected.</div>';

    const mahapurushaCards = (yogas.pancha_mahapurusha || []).length
      ? (yogas.pancha_mahapurusha).map(y => `<div class="yoga-card">
          <div class="yoga-card-name">Pancha Mahapurusha — ${escapeHTML(y.name)}</div>
          <div class="yoga-card-detail">${escapeHTML(y.graha)} in ${escapeHTML(y.rasi)} H${y.house} (kendra, own/exalted sign)</div>
        </div>`).join('')
      : '<div class="yoga-none">None detected.</div>';

    const neechaCards = (yogas.neechabhanga || []).length
      ? (yogas.neechabhanga).map(y => `<div class="yoga-card">
          <div class="yoga-card-name">Neechabhanga — ${escapeHTML(y.graha)} (debilitation cancelled)</div>
          <div class="yoga-card-detail">${escapeHTML(y.graha)} debilitated in ${escapeHTML(y.debilitation_sign)} H${y.house} · cancelled by: ${(y.cancellation_by || []).map(s => escapeHTML(s)).join('; ')}</div>
        </div>`).join('')
      : '<div class="yoga-none">None detected.</div>';

    const viparitaCards = (yogas.viparita_raja_yogas || []).length
      ? (yogas.viparita_raja_yogas).map(y => `<div class="yoga-card">
          <div class="yoga-card-name">Viparita Raja Yoga — ${escapeHTML(y.lord)}</div>
          <div class="yoga-card-detail">${escapeHTML(y.lord)}, lord of H${y.owns_house} (dusthana), placed in H${y.placed_in_house} (another dusthana)</div>
        </div>`).join('')
      : '<div class="yoga-none">None detected.</div>';

    function extYogaCards(list) {
      return (list || []).length
        ? list.map(y => `<div class="yoga-card">
            <div class="yoga-card-name">${escapeHTML(y.name)}</div>
            <div class="yoga-card-detail">${escapeHTML(y.detail)}<span style="color:var(--muted);font-size:0.78rem;margin-left:6px">[${escapeHTML(y.source || '')}]</span></div>
          </div>`).join('')
        : '<div class="yoga-none">None detected.</div>';
    }

    // ── Functional nature card ───────────────────────────────────────────────
    const fn = features.functional_nature || {};
    const fnPlanets = fn.planets || {};
    const fnYKs  = (fn.yogakarakas || []).join(', ') || 'none';
    const fnMKs  = (fn.maraka_lords || []).join(', ') || 'none';
    const _FN_COLOR = { yogakaraka: 'var(--success)', benefic: 'var(--info)', neutral: 'var(--muted)', malefic: 'var(--error)' };
    const fnRows = Object.entries(fnPlanets).map(([g, info]) => {
      const col = _FN_COLOR[info.role] || 'var(--muted)';
      const badges = (info.is_yogakaraka ? '<span style="color:var(--success);font-size:0.7rem;font-weight:700">YK</span> ' : '')
                   + (info.is_maraka     ? '<span style="color:var(--error);font-size:0.7rem">MK</span> '                        : '');
      return `<tr>
        <td>${escapeHTML(g)}</td>
        <td style="color:${col};font-weight:600">${escapeHTML(info.role)}</td>
        <td style="color:var(--muted);font-size:0.78rem">${(info.houses_owned||[]).map(h=>'H'+h).join(', ')}</td>
        <td>${badges}</td>
      </tr>`;
    }).join('');

    const yogasPanel = `
      <div class="result-card">
        <div class="result-card-header">&#9653; Functional Planetary Nature &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— Raman lagna-specific roles</span></div>
        <div style="padding:10px 14px">
          <div style="font-size:0.83rem;margin-bottom:8px">
            <strong style="color:var(--success)">Yogakaraka:</strong> ${escapeHTML(fnYKs)} &nbsp;&nbsp;
            <strong style="color:var(--error)">Maraka lords:</strong> ${escapeHTML(fnMKs)}
          </div>
          <table style="font-size:0.82rem;width:100%">
            <thead><tr><th>Planet</th><th>Role</th><th>Owns</th><th></th></tr></thead>
            <tbody>${fnRows}</tbody>
          </table>
        </div>
      </div>
      <div class="result-card">
        <div class="result-card-header">&#9733; Yoga Summary</div>
        <div style="padding:14px 16px;display:flex;flex-wrap:wrap;gap:10px">
          ${gajakesariFlag}
          ${kemadrumaFlag}
        </div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Raja Yogas &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— trikona + kendra lord association</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${rajaCards}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Dhana Yogas &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— wealth lord association</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${dhanaCards}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Pancha Mahapurusha &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— planet in kendra, own/exalted</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${mahapurushaCards}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Neechabhanga Raja Yoga &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— debilitation cancelled</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${neechaCards}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Viparita Raja Yoga &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— dusthana lord in dusthana</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${viparitaCards}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Lunar Yogas &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— Sunapha, Anapha, Durudhara, Adhi, Shakata</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${extYogaCards(yogas.lunar_yogas)}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Solar Yogas &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— Vesi, Vasi, Ubhayachari</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${extYogaCards(yogas.solar_yogas)}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Conjunction Yogas &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— Budhaditya, Guru-Chandala, Dharma-Karmadhipati, Kartari</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${extYogaCards(yogas.conjunction_yogas)}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Wealth Yogas &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— Lakshmi, Saraswati, Vasumati, Kalanidhi</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${extYogaCards(yogas.wealth_yogas)}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Special Yogas &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— Amala, Kahala, Mahabhagya, Parvata, Kuja Dosha, Graha Malika</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${extYogaCards(yogas.special_yogas)}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Nabhasa Yogas &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— Rajju, Musala, Mala, Sarpa, Sankhya</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${extYogaCards(yogas.nabhasa_yogas)}</div>
      </div>
      <div class="result-card">
        <div class="result-card-header">Kartari Yogas &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.78rem">— houses hemmed by benefics or malefics</span></div>
        <div style="padding:12px 14px" class="yoga-cards">${extYogaCards(yogas.kartari_yogas)}</div>
      </div>`;

    // ── Assemble output with tabs ────────────────────────────────────────────
    document.getElementById('chart-section').innerHTML = `
      <div class="tab-bar" id="chart-tabs">
        <button class="tab-btn active" id="tab-chart-btn"   onclick="switchTab('chart-tabs','ctab','tab-chart')">&#9728; Chart</button>
        <button class="tab-btn"        id="tab-drishti-btn" onclick="switchTab('chart-tabs','ctab','tab-drishti')">&#128257; Drishti</button>
        <button class="tab-btn"        id="tab-vargas-btn"  onclick="switchTab('chart-tabs','ctab','tab-vargas')">&#9651; Vargas</button>
        <button class="tab-btn"        id="tab-yogas-btn"   onclick="switchTab('chart-tabs','ctab','tab-yogas')">&#9733; Yogas</button>
      </div>

      <!-- Chart tab -->
      <div class="tab-panel ctab active" id="tab-chart-panel">
        <div class="result-card">
          <div class="result-card-header">&#9728; Natal Chart &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.82rem">Lagna: <strong style="color:var(--text)">${escapeHTML(lagna)}</strong></span></div>
          <table>
            <thead><tr><th>Planet</th><th>Sign / Dignity</th><th style="text-align:center">House</th><th style="text-align:center">Degree</th><th style="text-align:center">℞</th><th style="text-align:center" title="Functional role for this lagna">Fn</th></tr></thead>
            <tbody>${tbody || '<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:20px">No planet data.</td></tr>'}</tbody>
          </table>
        </div>
        <div class="result-card">
          <div class="result-card-header">&#9651; Houses</div>
          <table>
            <thead><tr><th>House</th><th>Sign</th><th>Lord</th><th>Occupants</th></tr></thead>
            <tbody>${houseTbody}</tbody>
          </table>
        </div>
        ${dashaRows ? `<div class="result-card">
          <div class="result-card-header">&#9679; Vimshottari Dashas</div>
          <table>
            <thead><tr><th>Dasha</th><th>Start</th><th>End</th></tr></thead>
            <tbody>${dashaRows}</tbody>
          </table>
        </div>` : ''}
      </div>

      <!-- Drishti tab -->
      <div class="tab-panel ctab" id="tab-drishti-panel">
        <div class="result-card">
          <div class="result-card-header">&#128257; Drishti Matrix
            <span style="font-weight:400;font-size:0.76rem;color:var(--muted);margin-left:8px">
              <span class="badge badge-graha">orange</span> graha &nbsp;
              <span class="badge badge-rashi">blue</span> rashi &nbsp;
              <span class="badge badge-double">green</span> double &nbsp;
              <span class="badge badge-occ">red</span> occupant
            </span>
          </div>
          <table>
            <thead><tr><th>H</th><th>Sign</th><th>Occupants</th><th>Aspected by</th><th style="text-align:center">Strength</th></tr></thead>
            <tbody>${drishtiRows || '<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:20px">No drishti data.</td></tr>'}</tbody>
          </table>
        </div>
      </div>

      <!-- Vargas tab -->
      <div class="tab-panel ctab" id="tab-vargas-panel">
        <div style="font-size:0.82rem;color:var(--muted);padding:4px 0 8px">
          15 divisional charts. Highlighted planets = scope karakas. Click "Planets" to expand positions.
        </div>
        ${vargaCards}
      </div>

      <!-- Yogas tab -->
      <div class="tab-panel ctab" id="tab-yogas-panel">
        ${yogasPanel}
      </div>`;
  }

  function formatYoga(y) {
    const t = y.type || '';
    const note = y.note ? ` — ${y.note}` : '';
    if (t === 'lagna_lord_kendra')    return `Lagna lord ${y.graha} in kendra (H${y.house})`;
    if (t === 'lagna_lord_trikona')   return `Lagna lord ${y.graha} in trikona (H${y.house})`;
    if (t === 'lagna_lord_strong')    return `Lagna lord ${y.graha} ${y.dignity}`;
    if (t === 'lagna_lord_dusthana')  return `Lagna lord ${y.graha} in dusthana (H${y.house})`;
    if (t === 'sign_exchange')        return `${y.graha_a} ↔ ${y.graha_b} exchange (H${y.house_a}↔H${y.house_b})`;
    // D6
    if (t === 'd6_h6_lord_strong')    return `H6 lord ${y.graha} ${y.dignity} (health challenge)`;
    if (t === 'd6_h8_lord_strong')    return `H8 lord ${y.graha} ${y.dignity} (obstacle indicated)`;
    if (t === 'd6_h6_lord_kendra')    return `H6 lord ${y.graha} in kendra H${y.house}`;
    if (t === 'd6_h8_lord_kendra')    return `H8 lord ${y.graha} in kendra H${y.house}`;
    if (t === 'd6_malefic_in_lagna')  return `${y.graha} in D6 lagna (constitutional vulnerability)`;
    // D8
    if (t === 'd8_8th_lord_strong')   return `8th lord ${y.graha} ${y.dignity} (longevity factor)`;
    if (t === 'd8_8th_lord_dusthana') return `8th lord ${y.graha} in dusthana H${y.house}`;
    // D9
    if (t === 'd9_7th_lord_strong')   return `7th lord ${y.graha} ${y.dignity} in H${y.house} (marriage strength)`;
    if (t === 'd9_7th_lord_kendra')   return `7th lord ${y.graha} in kendra H${y.house}`;
    if (t === 'd9_venus_strong')      return `Venus ${y.dignity} in H${y.house} (partnership quality)`;
    // D10
    if (t === 'd10_career_planet_prominent') return `${y.graha} in H${y.house} (career emphasis)`;
    // D12
    if (t === 'd12_parent_luminary_exalted')    return `${y.graha} exalted (parent benefic)`;
    if (t === 'd12_parent_luminary_debilitated') return `${y.graha} debilitated (parent challenge)`;
    // D16
    if (t === 'd16_venus_strong')     return `Venus ${y.dignity} in H${y.house}${note}`;
    if (t === 'd16_venus_dusthana')   return `Venus in dusthana H${y.house}${note}`;
    if (t === 'd16_moon_strong')      return `Moon ${y.dignity} in H${y.house}${note}`;
    if (t === 'd16_moon_debilitated') return `Moon debilitated in H${y.house}${note}`;
    if (t === 'd16_4th_lord_strong')  return `4th lord ${y.graha} ${y.dignity} (vehicle fortune)`;
    // D20
    if (t === 'd20_jupiter_strong')   return `Jupiter ${y.dignity} in H${y.house}${note}`;
    if (t === 'd20_jupiter_angular')  return `Jupiter in H${y.house}${note}`;
    if (t === 'd20_ketu_trikona')     return `Ketu in trikona H${y.house}${note}`;
    if (t === 'd20_moon_strong')      return `Moon ${y.dignity} in H${y.house}${note}`;
    if (t === 'd20_9th_lord_strong')  return `9th lord ${y.graha} ${y.dignity}${note}`;
    // D24
    if (t === 'd24_mercury_strong')   return `Mercury ${y.dignity} in H${y.house}${note}`;
    if (t === 'd24_mercury_dusthana') return `Mercury in dusthana H${y.house}${note}`;
    if (t === 'd24_jupiter_strong')   return `Jupiter ${y.dignity} in H${y.house}${note}`;
    if (t === 'd24_h4_lord_strong')   return `4th lord ${y.graha} ${y.dignity} (academic foundation)`;
    if (t === 'd24_h5_lord_strong')   return `5th lord ${y.graha} ${y.dignity} (intelligence strong)`;
    if (t === 'd24_h4_lord_dusthana') return `4th lord ${y.graha} in dusthana H${y.house}`;
    if (t === 'd24_h5_lord_dusthana') return `5th lord ${y.graha} in dusthana H${y.house}`;
    // D27
    if (t === 'd27_sun_strong')       return `Sun ${y.dignity} in H${y.house}${note}`;
    if (t === 'd27_sun_debilitated')  return `Sun debilitated in H${y.house}${note}`;
    if (t === 'd27_mars_strong')      return `Mars ${y.dignity} in H${y.house}${note}`;
    if (t === 'd27_mars_dusthana')    return `Mars in dusthana H${y.house}${note}`;
    if (t === 'd27_saturn_exalted')   return `Saturn exalted in H${y.house}${note}`;
    if (t === 'd27_saturn_debilitated') return `Saturn debilitated in H${y.house}${note}`;
    if (t === 'd27_lagna_lord_dusthana') return `Lagna lord ${y.graha} in H${y.house}${note}`;
    // D30
    if (t === 'd30_malefic_sensitive_house') return `${y.graha} in H${y.house} (misfortune area)`;
    // D60
    if (t === 'd60_saturn_strong')    return `Saturn ${y.dignity} in H${y.house}${note}`;
    if (t === 'd60_saturn_debilitated') return `Saturn debilitated in H${y.house}${note}`;
    if (t === 'd60_rahu_trikona')     return `Rahu in trikona H${y.house}${note}`;
    if (t === 'd60_ketu_trikona')     return `Ketu in trikona H${y.house}${note}`;
    if (t === 'd60_lagna_lord_strong') return `Lagna lord ${y.graha} ${y.dignity}${note}`;
    return t.replace(/_/g, ' ');
  }

  // ── Generate Prediction ─────────────────────────────────────────────────────
  function ensurePredTabs() {
    const sec = document.getElementById('prediction-section');
    if (document.getElementById('pred-tabs')) return;
    sec.innerHTML = `
      <div class="tab-bar" id="pred-tabs">
        <button class="tab-btn active" id="pred-standard-btn"
          onclick="switchTab('pred-tabs','ptab','pred-standard')">&#9788; Standard</button>
        <button class="tab-btn" id="pred-raman-btn"
          onclick="switchTab('pred-tabs','ptab','pred-raman')">&#9775; Raman</button>
      </div>
      <div class="tab-panel ptab active" id="pred-standard-panel"></div>
      <div class="tab-panel ptab"        id="pred-raman-panel"></div>
    `;
  }

  async function runPrediction(ramanMethod) {
    const form = collectForm();
    if (!form) return;

    const label   = ramanMethod ? 'Raman' : 'Standard';
    const panelId = ramanMethod ? 'pred-raman-panel' : 'pred-standard-panel';
    const tabId   = ramanMethod ? 'pred-raman'       : 'pred-standard';

    ensurePredTabs();
    document.getElementById(panelId).innerHTML =
      '<div style="color:var(--muted);padding:16px;">Generating…</div>';
    switchTab('pred-tabs', 'ptab', tabId);
    showSpinner('Generating ' + label + ' prediction…');

    try {
      const resp = await fetch('/predictions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...form, raman_method: ramanMethod }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }
      const data = await resp.json();
      hideSpinner();
      renderPrediction(data, panelId);
    } catch (err) {
      showError('Prediction error: ' + err.message);
    }
  }

  // ── Parse a possibly-stringified dict into display text ─────────────────────
  function parseDetail(raw) {
    if (typeof raw !== 'string') return String(raw);
    const m = raw.match(/['\"]description['\"]\s*:\s*['"]([^'"]+)['"]/);
    if (m) return m[1];
    return raw;
  }

  function renderPrediction(data, containerId) {
    const target = containerId
      ? document.getElementById(containerId)
      : document.getElementById('prediction-section');
    const sections = data.sections || [];
    if (!sections.length) {
      target.innerHTML = '<div class="error-banner active">No prediction sections returned.</div>';
      return;
    }

    const idPrefix = containerId || 'pred';
    let html = '';
    sections.forEach((sec, idx) => {
      const icon  = SCOPE_ICONS[sec.scope] || '&#9733;';
      const title = (sec.scope || 'Unknown').replace(/^\w/, c => c.toUpperCase());

      const detailsHTML = (sec.details || []).map(d =>
        `<li>${escapeHTML(parseDetail(d))}</li>`
      ).join('');

      const evidence = sec.evidence || [];
      const evCount  = evidence.length;
      const evId     = idPrefix + '-ev-' + idx;
      let evHTML = '';
      if (evCount > 0) {
        const items = evidence.map(ev =>
          `<div class="evidence-item">
            <div class="ev-source">${escapeHTML(ev.source || ev.chunk_id || 'Unknown source')}</div>
            <div class="ev-text">${escapeHTML((ev.text || ev.passage || '').substring(0, 300))}${(ev.text || ev.passage || '').length > 300 ? '…' : ''}</div>
          </div>`
        ).join('');
        evHTML = `
          <button class="evidence-toggle" onclick="toggleEvidence('${evId}', this)">
            &#128218; ${evCount} evidence passage${evCount !== 1 ? 's' : ''} &#9660;
          </button>
          <div class="evidence-panel" id="${evId}">${items}</div>`;
      }

      html += `
        <div class="pred-card">
          <div class="pred-card-header">
            <span class="pred-icon">${icon}</span>
            <span class="pred-title">${title}</span>
          </div>
          <div class="pred-body">
            <div class="pred-summary">${escapeHTML(sec.summary || '')}</div>
            ${detailsHTML ? `<ul class="pred-details">${detailsHTML}</ul>` : ''}
            ${evHTML}
          </div>
        </div>`;
    });

    target.innerHTML = html;
  }

  function toggleEvidence(id, btn) {
    const panel = document.getElementById(id);
    panel.classList.toggle('open');
    const isOpen = panel.classList.contains('open');
    btn.innerHTML = btn.innerHTML.replace(isOpen ? '&#9660;' : '&#9650;', isOpen ? '&#9650;' : '&#9660;');
  }

  function escapeHTML(str) {
    if (typeof str !== 'string') str = String(str);
    return str
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;')
      .replace(/'/g,  '&#039;');
  }

  // Initialise on load
  initBackendSelector();
</script>
